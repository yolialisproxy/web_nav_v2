
<!DOCTYPE html>
<html>
<head>
    <title>Error Interceptor Test</title>
    <script src="assets/js/error-interceptor.js"></script>
</head>
<body>
    <h1>Error Interceptor Test</h1>
    <button onclick="triggerError()">Trigger Error</button>
    <button onclick="showErrors()">Show Stored Errors</button>
    <button onclick="clearErrors()">Clear Errors</button>
    <div id="output"></div>
    <script>
        function triggerError() {
            // This will cause a ReferenceError
            undefinedVariable.someProperty;
        }
        
        function showErrors() {
            const errors = window.getStoredJsErrors ? window.getStoredJsErrors() : [];
            document.getElementById('output').innerHTML = '<h2>Stored Errors:</h2><pre>' + JSON.stringify(errors, null, 2) + '</pre>';
        }
        
        function clearErrors() {
            if (window.clearStoredJsErrors) {
                window.clearStoredJsErrors();
                document.getElementById('output').innerHTML = '<p>Errors cleared</p>';
            }
        }
    </script>
</body>
</html>
