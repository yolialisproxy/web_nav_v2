<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>啃魂导航 V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-bold">🔮 啃魂导航 V2</h1>
            <input id="search" type="text" placeholder="搜索站点..." class="px-3 py-2 border rounded-lg w-64">
        </div>
    </header>
    <div class="max-w-7xl mx-auto px-4 py-4 flex gap-6">
        <aside id="sidebar" class="w-64 shrink-0 hidden lg:block">
            <div id="category-list" class="sticky top-24 space-y-1"></div>
        </aside>
        <main class="flex-1">
            <div id="sites" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
        </main>
    </div>

    <script src="js/data.js"></script>
    <script>
        const sitesEl = document.getElementById('sites');
        const searchEl = document.getElementById('search');
        const catEl = document.getElementById('category-list');

        function renderSites(list) {
            sitesEl.innerHTML = list.map(site => `
            <a href="${site.url}" target="_blank" rel="noopener" class="bg-white p-4 rounded-lg shadow-sm hover:shadow-md transition-all hover:-translate-y-1 block">
                <div class="font-bold">${site.title}</div>
                <div class="text-sm text-gray-500 mt-1 line-clamp-2">${site.description || ''}</div>
            </a>
            `).join('');
        }

        function renderCategories() {
            const cats = [...new Set(window.SITES.map(s => s.category))].sort();
            catEl.innerHTML = cats.map(cat => `
            <button class="w-full text-left px-3 py-2 rounded hover:bg-gray-100">${cat}</button>
            `).join('');
        }

        searchEl.addEventListener('input', e => {
            const q = e.target.value.toLowerCase();
            renderSites(window.SITES.filter(s =>
                s.title.toLowerCase().includes(q) || s.description?.toLowerCase().includes(q)
            ));
        });

        renderCategories();
        renderSites(window.SITES);
    </script>
</body>
</html>
