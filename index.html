<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>啃魂导航</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f0f0f;
            color: #e8e8e8;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            line-height: 1.5;
            min-height: 100vh;
        }

        #app {
            min-height: 100vh;
        }

        .loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 16px;
            color: #888;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading::before {
            content: '';
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #333;
            border-top-color: #ffd700;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 12px;
            vertical-align: middle;
        }

        /* 顶部导航栏 */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 56px;
            background: #1a1a1a;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            padding: 0 20px;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 18px;
            font-weight: 600;
            color: #ffd700;
            margin-right: 30px;
            cursor: pointer;
        }

        .search-input {
            flex: 1;
            max-width: 600px;
            height: 40px;
            background: #252525;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 0 16px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: all 0.2s;
        }

        .search-input:focus {
            border-color: #ffd700;
            box-shadow: 0 0 0 2px rgba(255, 215, 0, 0.1);
        }

        .search-input::placeholder {
            color: #666;
        }

        /* 页面主体容器 */
        .container {
            padding-top: 80px;
            max-width: 1200px;
            margin: 0 auto;
            padding-left: 20px;
            padding-right: 20px;
        }

        /* 分类网格 */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-top: 40px;
        }

        .category-card {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 24px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .category-card:hover {
            border-color: #ffd700;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.1);
        }

        .category-card h3 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #fff;
        }

        .category-card .count {
            font-size: 14px;
            color: #888;
        }

        @media (max-width: 768px) {
            .category-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 14px;
            }
        }

        @media (max-width: 480px) {
            .category-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="loading">正在加载数据...</div>
    </div>

    <script>
        const App = {
            data: null,
            currentView: 'grid',
            activeCategory: null,
            searchQuery: '',

            async init() {
                try {
                    const res = await fetch('./data/websites.json');
                    if (!res.ok) throw new Error('数据文件加载失败');

                    App.data = await res.json();
                    console.log(`✅ 数据加载完成，共 ${App.data.length} 个网站`);

                    App.render();
                } catch (err) {
                    console.error('❌ 数据加载失败:', err);
                    document.querySelector('.loading').textContent = '数据加载失败，请刷新重试';
                }
            },

            render() {
                const app = document.getElementById('app');
                app.innerHTML = `
                    <h1 style="padding: 40px; text-align: center; color: #ffd700;">啃魂导航 V2</h1>
                    <div style="text-align: center; color: #888; margin-top: 10px;">
                        已加载 ${App.data.length} 个网站
                    </div>
                `;
            }
        };

        document.addEventListener('DOMContentLoaded', () => App.init());
    </script>
</body>
</html>
