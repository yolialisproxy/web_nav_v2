<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>啃魂导航 V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <button id="sidebar-toggle" class="p-2 rounded-lg hover:bg-gray-100 transition-colors">
                    <i class="fas fa-bars"></i>
                </button>
                <h1 class="text-xl font-bold">🔮 啃魂导航 V2</h1>
            </div>
            <input id="search" type="text" placeholder="搜索站点..." class="px-3 py-2 border rounded-lg w-64">
        </div>
    </header>
    <div class="max-w-7xl mx-auto px-4 py-4 flex gap-6">
        <aside id="sidebar" class="w-64 shrink-0 hidden lg:block transition-all duration-300 ease-in-out overflow-hidden">
            <div id="category-list" class="sticky top-24 space-y-1"></div>
        </aside>
        <main id="main-content" class="flex-1 transition-all duration-300 ease-in-out">
            <div id="sites" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
        </main>
    </div>

    <script src="js/data.js"></script>
    <script>
        const sitesEl = document.getElementById('sites');
        const searchEl = document.getElementById('search');
        const catEl = document.getElementById('category-list');

        function renderSites(list) {
            sitesEl.innerHTML = list.map(site => `
            <a href="${site.url}" target="_blank" rel="noopener" class="bg-white p-4 rounded-lg shadow-sm hover:shadow-md transition-all hover:-translate-y-1 block">
                <div class="font-bold">${site.title}</div>
                <div class="text-sm text-gray-500 mt-1 line-clamp-2">${site.description || ''}</div>
            </a>
            `).join('');
        }

        function renderCategories() {
            const cats = [...new Set(window.SITES.map(s => s.category))].sort();
            catEl.innerHTML = cats.map(cat => `
            <button class="w-full text-left px-3 py-2 rounded hover:bg-gray-100 transition-colors" data-category="${cat}">${cat}</button>
            `).join('');

            // Category click filtering
            catEl.querySelectorAll('button').forEach(btn => {
                btn.addEventListener('click', e => {
                    // Clear active state
                    catEl.querySelectorAll('button').forEach(b => b.classList.remove('bg-blue-50', 'text-blue-700', 'font-medium'));
                    // Set active state
                    btn.classList.add('bg-blue-50', 'text-blue-700', 'font-medium');
                    // Filter sites
                    const selectedCat = btn.dataset.category;
                    renderSites(window.SITES.filter(s => s.category === selectedCat));
                    // Scroll to top
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });
            });
        }

        searchEl.addEventListener('input', e => {
            const q = e.target.value.toLowerCase();
            renderSites(window.SITES.filter(s =>
                s.title.toLowerCase().includes(q) || s.description?.toLowerCase().includes(q)
            ));
        });

        renderCategories();
        renderSites(window.SITES);

        // Sidebar Toggle Functionality
        const sidebarToggle = document.getElementById('sidebar-toggle');
        const sidebar = document.getElementById('sidebar');
        const mainContent = document.getElementById('main-content');
        const toggleIcon = sidebarToggle.querySelector('i');

        function setSidebarState(collapsed) {
            if (collapsed) {
                sidebar.classList.add('w-0', 'lg:w-0', 'opacity-0');
                sidebar.classList.remove('w-64', 'lg:w-64');
                toggleIcon.className = 'fas fa-angles-right';
                localStorage.setItem('sidebar_collapsed', 'true');
            } else {
                sidebar.classList.remove('w-0', 'lg:w-0', 'opacity-0');
                sidebar.classList.add('w-64', 'lg:w-64');
                toggleIcon.className = 'fas fa-bars';
                localStorage.setItem('sidebar_collapsed', 'false');
            }
        }

        // Load saved state on page load
        const savedState = localStorage.getItem('sidebar_collapsed');
        if (savedState === 'true') {
            setSidebarState(true);
        }

        sidebarToggle.addEventListener('click', () => {
            const isCollapsed = sidebar.classList.contains('w-0');
            setSidebarState(!isCollapsed);
        });
    </script>
</body>
</html>
