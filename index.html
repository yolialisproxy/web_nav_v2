<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>啃魂导航 V2</title>
    <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/core.css">
    <link rel="stylesheet" href="assets/css/components.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen">
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <button id="sidebar-toggle" class="p-2 rounded-lg hover:bg-gray-100 transition-colors">
                    <i class="fas fa-bars"></i>
                </button>
                <h1 class="text-xl font-bold">🔮 啃魂导航 V2</h1>
            </div>
            <input id="search" type="text" placeholder="搜索站点..." class="px-3 py-2 border rounded-lg w-64">
        </div>
    </header>
    <div class="max-w-7xl mx-auto px-4 py-4 flex gap-6">
        <aside id="sidebar" class="w-64 shrink-0 hidden lg:block transition-all duration-300 ease-in-out overflow-hidden">
            <div id="category-list" class="sticky top-24 space-y-1"></div>
        </aside>
        <main id="main-content" class="flex-1 transition-all duration-300 ease-in-out">
            <div id="sites" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4"></div>
        </main>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js?v=1"></script>
</body>
</html>
