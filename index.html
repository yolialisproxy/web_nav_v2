<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>啃魂导航 V2 - 智能开发者导航</title>
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <!-- 现代主题 CSS -->
    <link rel="stylesheet" href="assets/css/theme-modern.css">
</head>
<body class="min-h-screen">
    <!-- 毛玻璃顶栏 -->
    <header id="header" class="sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <button id="sidebar-toggle" class="p-2 rounded-lg hover:bg-white/10 transition-colors lg:hidden">
                    <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"></path>
                    </svg>
                </button>
                <h1 class="text-lg font-bold">啃魂导航</h1>
            </div>

            <div class="relative flex-1 max-w-md ml-auto">
                <svg class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-sm pointer-events-none" aria-hidden="true"></svg>
                <input type="text" id="search-input" placeholder="搜索资源... (Ctrl/Cmd + K)"
                       class="w-full pl-10 pr-10 py-2.5 rounded-xl">
                <button id="search-clear" class="absolute right-3 top-1/2 -translate-y-1/2 hidden">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
        </div>
    </header>

    <!-- 侧边栏遮罩 -->
    <div id="sidebar-overlay" class="fixed inset-0 z-40 hidden lg:hidden"></div>

    <div class="max-w-7xl mx-auto px-4 py-4 flex gap-6">
        <!-- 侧边栏 -->
        <aside id="sidebar" class="w-64 shrink-0 transition-all duration-300 ease-in-out overflow-hidden fixed lg:sticky top-16 left-0 h-[calc(100vh-4rem)] z-40 shadow-2xl lg:shadow-none -translate-x-full lg:translate-x-0 lg:w-64">
            <nav id="sidebar-content" class="sticky top-4 space-y-1 p-2 overflow-y-auto h-full"></nav>
        </aside>

        <!-- 主内容 -->
        <main id="main-content" class="flex-1 transition-all duration-300 ease-in-out w-full lg:min-h-[calc(100vh-8rem)] overflow-y-auto"></main>
    </div>

    <!-- 搜索覆盖层 -->
    <div id="search-overlay" class="search-overlay fixed inset-0 z-50 hidden">
        <div class="search-container max-w-2xl mx-auto px-4 py-20">
            <div class="search-input relative">
                <svg class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-2xl pointer-events-none" aria-hidden="true"></svg>
                <input type="text" id="search-overlay-input" placeholder="输入关键词搜索资源..."
                       class="w-full pl-12 pr-12 py-4 border-0 rounded-xl">
                <button id="search-overlay-clear" class="absolute right-4 top-1/2 -translate-y-1/2 hidden">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path>
                    </svg>
                </button>
            </div>
            <div id="search-results" class="mt-6 space-y-2 max-h-96 overflow-y-auto"></div>
        </div>
    </div>

    <!-- 脚本 -->
    <script src="assets/js/state.js"></script>
    <script src="assets/js/data.js"></script>
    <script src="assets/js/search.js"></script>
    <script src="assets/js/render.js"></script>
    <script src="assets/js/app.js"></script>
    <div id="view-container" style="display:none"></div>
</body>
</html>
