<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>WebNav - AI-Powered Navigation Website</title>
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
 <link rel="stylesheet" href="https://unpkg.com/swiper/swiper-bundle.min.css" />
 <link rel="stylesheet" href="assets/css/all.css?v=2.6">
</head>
<body>

<header class="header">
 <a href="#" class="logo">WebNav</a>
 <div class="search-container">
  <input type="text" id="search-input" placeholder="Search sites...">
  <button id="search-btn">Search</button>
 </div>
 <div id="menu-bars" class="fas fa-bars"></div>
</header>

<aside class="sidebar">
 <h2>Categories</h2>
 <ul class="category-list">
  <!-- Categories will be populated by JS -->
 </ul>
</aside>

<main id="main-content">
 <div class="site-list">
  <!-- Sites will be populated by JS -->
 </div>
</main>

<footer class="footer">
 <div class="box-container">
  <div class="box"><h3>quick links</h3><a href="#home">home</a><a href="#about">about</a></div>
  <div class="box"><h3>contact info</h3><a href="mailto:yoli_alis@2925.com">yoli_alis@2925.com</a></div>
 </div>
 <div class="credit">created by <span>啃魂</span> | all rights reserved</div>
</footer>

<div class="theme-toggler">
 <div class="toggle-btn"><i class="fas fa-cog"></i></div>
 <h3>choose color</h3>
 <div class="buttons">
  <div class="theme-btn" style="background: #3498db"></div>
  <div class="theme-btn" style="background: #ff3344"></div>
  <div class="theme-btn" style="background: #27ae60"></div>
  <div class="theme-btn" style="background: #f39c12"></div>
  <div class="theme-btn" style="background: #9b59b6"></div>
 </div>
</div>

<script src="https://unpkg.com/swiper/swiper-bundle.min.js"></script>
<script src="assets/js/data.js" defer></script>
<script src="assets/js/app.js" defer></script>
</body>
</html>
