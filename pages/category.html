<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>分类 - 啃魂导航</title>
    <link rel="stylesheet" href="../assets/css/core.css">
    <link rel="stylesheet" href="../assets/css/theme-modern.css">
    <link rel="stylesheet" href="../assets/css/components.css">
    <link rel="stylesheet" href="../assets/css/responsive.css">
    <link rel="stylesheet" href="../assets/css/style.css">
</head>
<body class="min-h-screen" id="app-root" data-theme="system">
    <div id="skeleton-screen" class="skeleton-screen">
        <div class="skeleton-header"></div>
        <div class="skeleton-layout">
            <div class="skeleton-sidebar">
                <div class="skeleton-line w-3/4"></div>
                <div class="skeleton-line w-1/2"></div>
            </div>
            <div class="skeleton-main">
                <div class="skeleton-line w-full"></div>
                <div class="skeleton-grid">
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                    <div class="skeleton-card"></div>
                </div>
            </div>
        </div>
    </div>

    <header id="header" class="sticky top-0 z-50" role="banner">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center gap-4">
            <h1 class="text-lg font-bold whitespace-nowrap">啃魂导航</h1>
            <div class="relative flex-1 max-w-md ml-auto">
                <input type="text" id="search-input" placeholder="搜索资源..." class="w-full pl-10 pr-10 py-2.5 rounded-xl" aria-label="搜索资源" autocomplete="off">
            </div>
        </div>
    </header>

    <main id="main-content" class="max-w-7xl mx-auto px-4 py-4" role="main">
        <div class="view-header">
            <div class="view-breadcrumb" id="breadcrumb">加载中...</div>
            <div class="view-meta" id="site-count">0 个站点</div>
        </div>
        <div id="sites-container" class="grid"></div>
    </main>

    <footer class="site-footer" role="contentinfo">
        <div class="footer-links">
            <a href="../index.html">首页</a>
            <a href="#">关于</a>
            <a href="#">反馈</a>
        </div>
        <p>啃魂导航 V3 &copy; 2026</p>
    </footer>

    <script src="../assets/js/state.js"></script>
    <script src="../assets/js/data.js"></script>
    <script src="../assets/js/search.js"></script>
    <script src="../assets/js/render.js"></script>
    <script src="../assets/js/tags.js"></script>
    <script src="../assets/js/favorite.js"></script>
    <script src="../assets/js/favorite-ui-bootstrap.js"></script>
    <script src="../assets/js/toast.js"></script>
    <script src="../assets/js/app.js"></script>
</body>
</html>
